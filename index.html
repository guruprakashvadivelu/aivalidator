  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta name="apple-mobile-web-app-title" content="AI Validator">
  <meta name="theme-color" content="#1f2937">
  <link rel="manifest" href="manifest.json">

  <title>AI Response Validator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* iOS Safari fixes */
    * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent;

    html, body {
      height: 100%;
      height: -webkit-fill-available;
      margin: 0;
      padding: 0;
      overflow: hidden;
      position: fixed;
      width: 100%;

    #root {
      height: 100%;
      height: -webkit-fill-available;

    /* Prevent zoom on iOS */

      font-size: 16px !important;

    /* Chat layout */

      height: 100%;

    .chat-header {

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      min-height: 0;
    }

    .chat-input {
      flex-shrink: 0;
      background: #1f2c34;

    .full-page {
      height: 100%;
      display: flex;

<body class="bg-gradient-to-br from-pink-50 to-purple-50 min-h-screen">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  
  <!-- Stealth Notifications System -->
  <script src="./notifications.js"></script>
  
  <script>
    // Initialize Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDK46UiKnPxMketKxxfnYdifDpIv3wKdvc",
      authDomain: "chat-4d5f4.firebaseapp.com",
      databaseURL: "https://chat-4d5f4-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "chat-4d5f4",
      storageBucket: "chat-4d5f4.firebasestorage.app",
      messagingSenderId: "525378181835",
      appId: "1:525378181835:web:a6c01ff3027c75c246d94e"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // Register service worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('Service Worker registered'))
          .catch(err => console.log('Service Worker registration failed'));
      });
    }
  </script>
  
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [isAuthenticated, setIsAuthenticated] = useState(false);
      const [currentUser, setCurrentUser] = useState('');
      const [passcode, setPasscode] = useState('');
      const [currentView, setCurrentView] = useState('responses'); // 'responses', 'chat', or 'settings'
      const [selectedChat, setSelectedChat] = useState(null);
      const [messages, setMessages] = useState([]);
      const [newMessage, setNewMessage] = useState('');
      const [typing, setTyping] = useState({});
      const [reads, setReads] = useState({});
      const [presence, setPresence] = useState({});
      const [uploading, setUploading] = useState(false);
      const [uploadProgress, setUploadProgress] = useState('');
      
      // Notification settings
      const [notificationPermission, setNotificationPermission] = useState(false);
      const [notificationSound, setNotificationSound] = useState(true);
      const [notificationVibration, setNotificationVibration] = useState(true);
      
      // Message deletion mode: 'after_read' or 'after_24h'
      const [deletionMode, setDeletionMode] = useState(() => {
        const saved = localStorage.getItem('messageDeletionMode');
        return saved || 'after_read';
      });
      
      // Call state
      const [inCall, setInCall] = useState(false);
      const [callType, setCallType] = useState('');
      const [incomingCall, setIncomingCall] = useState(null);
      const [isMuted, setIsMuted] = useState(false);
      const [isVideoOff, setIsVideoOff] = useState(false);
      
      const messagesEndRef = useRef(null);
      const typingTimeoutRef = useRef(null);
      const fileInputRef = useRef(null);
      const localVideoRef = useRef(null);
      const remoteVideoRef = useRef(null);
      const peerConnectionRef = useRef(null);
      const localStreamRef = useRef(null);

      const CORRECT_PASSCODE = 'Azure@12345';
      const CLEANUP_HOURS = 24;
      const MAX_FILE_SIZE_MB = 5;

      // Available users to chat with
      const availableUsers = currentUser === 'user1' 
        ? [{ id: 'user2', name: 'Instance B' }]
        : [{ id: 'user1', name: 'Instance A' }];

      const rtcConfig = {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' },
        ]
      };

      const compressImage = (file, maxSizeMB = MAX_FILE_SIZE_MB) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              let width = img.width;
              let height = img.height;
              
              const maxWidth = 1280;
              if (width > maxWidth) {
                height = (height * maxWidth) / width;
                width = maxWidth;
              }
              
              canvas.width = width;
              canvas.height = height;
              
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              
              let quality = 0.8;
              const tryCompress = () => {
                canvas.toBlob((blob) => {
                  const sizeMB = blob.size / 1024 / 1024;
                  
                  if (sizeMB <= maxSizeMB || quality <= 0.1) {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                  } else {
                    quality -= 0.1;
                    tryCompress();
                  }
                }, 'image/jpeg', quality);
              };
              
              tryCompress();
            };
            img.onerror = reject;
            img.src = e.target.result;
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      };

      const compressVideo = (file) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const base64 = e.target.result;
            const sizeMB = base64.length / 1024 / 1024;
            
            if (sizeMB > MAX_FILE_SIZE_MB) {
              reject(new Error(`Video too large (${sizeMB.toFixed(1)}MB). Please record a shorter video (max ${MAX_FILE_SIZE_MB}MB)`));
            } else {
              resolve(base64);
            }
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      };

      const cleanupOldContent = async () => {
        const now = Date.now();
        const cutoffTime = now - (CLEANUP_HOURS * 60 * 60 * 1000);

        try {
          const messagesSnapshot = await firebase.database().ref('messages').once('value');
          const messagesData = messagesSnapshot.val();

          if (messagesData) {
            const deletePromises = [];
            
            Object.keys(messagesData).forEach(msgId => {
              const msg = messagesData[msgId];
              const msgTime = new Date(msg.timestamp).getTime();
              
              if (msgTime < cutoffTime) {
                deletePromises.push(firebase.database().ref(`messages/${msgId}`).remove());
                deletePromises.push(firebase.database().ref(`reads/${msgId}`).remove());
              }
            });

            await Promise.all(deletePromises);
            console.log('Cleanup completed');
          }
        } catch (error) {
          console.error('Cleanup error:', error);
        }
      };

      const startCall = async (type) => {
        try {
          const constraints = {
            audio: true,
            video: type === 'video'
          };

          const stream = await navigator.mediaDevices.getUserMedia(constraints);
          localStreamRef.current = stream;

          if (localVideoRef.current) {
            localVideoRef.current.srcObject = stream;
          }

          const peerConnection = new RTCPeerConnection(rtcConfig);
          peerConnectionRef.current = peerConnection;

          stream.getTracks().forEach(track => {
            peerConnection.addTrack(track, stream);
          });

          peerConnection.ontrack = (event) => {
            if (remoteVideoRef.current) {
              remoteVideoRef.current.srcObject = event.streams[0];
            }
          };

          peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
              firebase.database().ref(`calls/${selectedChat}/candidate`).push({
                candidate: event.candidate.toJSON(),
                from: currentUser
              });
            }
          };

          const offer = await peerConnection.createOffer();
          await peerConnection.setLocalDescription(offer);

          await firebase.database().ref(`calls/${selectedChat}/offer`).set({
            offer: {
              type: offer.type,
              sdp: offer.sdp
            },
            from: currentUser,
            type: type,
            timestamp: Date.now()
          });

          setInCall(true);
          setCallType(type);
        } catch (error) {
          console.error('Error starting call:', error);
          alert('Could not access camera/microphone. Please check permissions.');
        }
      };

      const answerCall = async () => {
        try {
          const constraints = {
            audio: true,
            video: incomingCall.type === 'video'
          };

          const stream = await navigator.mediaDevices.getUserMedia(constraints);
          localStreamRef.current = stream;

          if (localVideoRef.current) {
            localVideoRef.current.srcObject = stream;
          }

          const peerConnection = new RTCPeerConnection(rtcConfig);
          peerConnectionRef.current = peerConnection;

          stream.getTracks().forEach(track => {
            peerConnection.addTrack(track, stream);
          });

          peerConnection.ontrack = (event) => {
            if (remoteVideoRef.current) {
              remoteVideoRef.current.srcObject = event.streams[0];
            }
          };

          peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
              firebase.database().ref(`calls/${selectedChat}/candidate`).push({
                candidate: event.candidate.toJSON(),
                from: currentUser
              });
            }
          };

          await peerConnection.setRemoteDescription(new RTCSessionDescription(incomingCall.offer));

          const answer = await peerConnection.createAnswer();
          await peerConnection.setLocalDescription(answer);

          await firebase.database().ref(`calls/${selectedChat}/answer`).set({
            answer: {
              type: answer.type,
              sdp: answer.sdp
            },
            from: currentUser
          });

          setInCall(true);
          setCallType(incomingCall.type);
          setIncomingCall(null);
        } catch (error) {
          console.error('Error answering call:', error);
          alert('Could not access camera/microphone. Please check permissions.');
        }
      };

      const rejectCall = () => {
        firebase.database().ref(`calls/${currentUser}`).remove();
        setIncomingCall(null);
      };

      const endCall = () => {
        if (localStreamRef.current) {
          localStreamRef.current.getTracks().forEach(track => track.stop());
        }
        if (peerConnectionRef.current) {
          peerConnectionRef.current.close();
        }
        
        firebase.database().ref(`calls/${currentUser}`).remove();
        firebase.database().ref(`calls/${selectedChat}`).remove();
        
        setInCall(false);
        setCallType('');
        setIsMuted(false);
        setIsVideoOff(false);
      };

      const toggleMute = () => {
        if (localStreamRef.current) {
          const audioTrack = localStreamRef.current.getAudioTracks()[0];
          if (audioTrack) {
            audioTrack.enabled = !audioTrack.enabled;
            setIsMuted(!audioTrack.enabled);
          }
        }
      };

      const toggleVideo = () => {
        if (localStreamRef.current) {
          const videoTrack = localStreamRef.current.getVideoTracks()[0];
          if (videoTrack) {
            videoTrack.enabled = !videoTrack.enabled;
            setIsVideoOff(!videoTrack.enabled);
          }
        }
      };

      useEffect(() => {
        if (isAuthenticated) {
          const presenceRef = firebase.database().ref(`presence/${currentUser}`);
          presenceRef.set({
            online: true,
            lastSeen: new Date().toISOString()
          });

          presenceRef.onDisconnect().set({
            online: false,
            lastSeen: new Date().toISOString()
          });

          const messagesRef = firebase.database().ref('messages');
          messagesRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
              const messagesList = Object.keys(data).map(key => ({
                id: key,
                ...data[key]
              }));
              messagesList.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
              setMessages(messagesList);
            } else {
              setMessages([]);
            }
          });

          const typingRef = firebase.database().ref('typing');
          typingRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            setTyping(data);
          });

          const readsRef = firebase.database().ref('reads');
          readsRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            setReads(data);
          });

          const presenceAllRef = firebase.database().ref('presence');
          presenceAllRef.on('value', (snapshot) => {
            const data = snapshot.val() || {};
            setPresence(data);
          });

          const callRef = firebase.database().ref(`calls/${currentUser}/offer`);
          callRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.from !== currentUser && !inCall) {
              setIncomingCall(data);
            }
          });

          const answerRef = firebase.database().ref(`calls/${currentUser}/answer`);
          answerRef.on('value', async (snapshot) => {
            const data = snapshot.val();
            if (data && peerConnectionRef.current) {
              await peerConnectionRef.current.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
          });

          const candidateRef = firebase.database().ref(`calls/${currentUser}/candidate`);
          candidateRef.on('child_added', async (snapshot) => {
            const data = snapshot.val();
            if (data && peerConnectionRef.current && data.from !== currentUser) {
              await peerConnectionRef.current.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
          });

          cleanupOldContent();
          const cleanupInterval = setInterval(cleanupOldContent, 60 * 60 * 1000);

          return () => {
            messagesRef.off();
            typingRef.off();
            readsRef.off();
            presenceAllRef.off();
            callRef.off();
            answerRef.off();
            candidateRef.off();
            clearInterval(cleanupInterval);
          };
        }
      }, [isAuthenticated, inCall]);

      useEffect(() => {
        if (currentView === 'chat') {
          scrollToBottom();
          if (isAuthenticated && selectedChat) {
            messages.forEach(msg => {
              if (msg.sender !== currentUser) {
                const readPath = `reads/${msg.id}/${currentUser}`;
                firebase.database().ref(readPath).set(true);
              }
            });
          }
        }
      }, [messages, isAuthenticated, currentUser, currentView, selectedChat]);

      // Auto-delete messages based on user preference
      useEffect(() => {
        if (!isAuthenticated) return;

        const deleteReadMessages = async () => {
          // Only delete if mode is 'after_read'
          if (deletionMode !== 'after_read') return;

          try {
            const messagesToDelete = messages.filter(msg => {
              // Delete message if current user has read it
              if (msg.sender !== currentUser) {
                return reads[msg.id] && reads[msg.id][currentUser];
              } else {
                // Delete message if other user has read it
                const otherUser = currentUser === 'user1' ? 'user2' : 'user1';
                return reads[msg.id] && reads[msg.id][otherUser];
              }
            });

            for (const msg of messagesToDelete) {
              await firebase.database().ref(`messages/${msg.id}`).remove();
              await firebase.database().ref(`reads/${msg.id}`).remove();
            }
          } catch (error) {
            console.error('Error deleting messages:', error);
          }
        };

        // Handle window close/refresh
        const handleBeforeUnload = (e) => {
          deleteReadMessages();
        };

        // Handle visibility change (tab switch, minimize)
        const handleVisibilityChange = () => {
          if (document.hidden) {
            deleteReadMessages();
          }
        };

        window.addEventListener('beforeunload', handleBeforeUnload);
        document.addEventListener('visibilitychange', handleVisibilityChange);

        return () => {
          window.removeEventListener('beforeunload', handleBeforeUnload);
          document.removeEventListener('visibilitychange', handleVisibilityChange);
        };
      }, [isAuthenticated, messages, reads, currentUser, deletionMode]);

      // Load notification settings on mount
      useEffect(() => {
        if (window.stealthNotifications) {
          const settings = window.stealthNotifications.getSettings();
          setNotificationPermission(settings.permission);
          setNotificationSound(settings.sound);
          setNotificationVibration(settings.vibration);
        }
      }, []);

      // Trigger notification on new messages from other user
      useEffect(() => {
        if (messages.length > 0 && isAuthenticated) {
          const lastMessage = messages[messages.length - 1];
          
          // Only notify if message is from other user
          if (lastMessage.sender !== currentUser) {
            // Trigger stealth notification
            if (window.notifyNewMessage) {
              window.notifyNewMessage();
            }
          }
        }
      }, [messages, currentUser, isAuthenticated]);



      const scrollToBottom = () => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      };

      const handleLogin = (user) => {
        if (passcode === CORRECT_PASSCODE) {
          setCurrentUser(user);
          setIsAuthenticated(true);
          setCurrentView('responses');
        } else {
          alert('Wrong passcode!');
        }
      };

      const handleSelectChat = (userId) => {
        setSelectedChat(userId);
        setCurrentView('chat');
      };

      const handleBackToResponses = async () => {
        // Delete read messages before going back - only if mode is 'after_read'
        if (deletionMode === 'after_read') {
          const messagesToDelete = messages.filter(msg => {
            if (msg.sender !== currentUser) {
              return reads[msg.id] && reads[msg.id][currentUser];
            } else {
              return reads[msg.id] && reads[msg.id][selectedChat];
            }
          });

          for (const msg of messagesToDelete) {
            await firebase.database().ref(`messages/${msg.id}`).remove();
            await firebase.database().ref(`reads/${msg.id}`).remove();
          }
        }

        setCurrentView('responses');
        setSelectedChat(null);
      };

      const handleFileSelect = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const isImage = file.type.startsWith('image/');
        const isVideo = file.type.startsWith('video/');
        
        if (!isImage && !isVideo) {
          alert('Please select an image or video file');
          return;
        }

        setUploading(true);
        setUploadProgress('Compressing...');

        try {
          let base64Data;
          
          if (isImage) {
            setUploadProgress('Compressing image...');
            base64Data = await compressImage(file);
          } else {
            setUploadProgress('Processing video...');
            base64Data = await compressVideo(file);
          }

          const sizeMB = (base64Data.length / 1024 / 1024).toFixed(1);
          console.log(`Compressed size: ${sizeMB}MB`);

          setUploadProgress('Sending...');

          const msg = {
            sender: currentUser,
            mediaData: base64Data,
            mediaType: isImage ? 'image' : 'video',
            timestamp: new Date().toISOString()
          };

          await firebase.database().ref('messages').push(msg);
          
        } catch (error) {
          console.error('Upload error:', error);
          alert(error.message || 'Failed to upload file. Please try a smaller file.');
        } finally {
          setUploading(false);
          setUploadProgress('');
          fileInputRef.current.value = '';
        }
      };

      // Desktop right-click support
      const handleContextMenu = (e) => {
        e.preventDefault();
        e.stopPropagation();
        // Show browser context menu - simple approach
        return false;
      };

      const handleSend = () => {
        if (newMessage.trim()) {
          const msg = {
            sender: currentUser,
            text: newMessage,
            timestamp: new Date().toISOString()
          };
          
          firebase.database().ref('messages').push(msg);
          setNewMessage('');
          firebase.database().ref(`typing/${currentUser}`).set(false);
        }
      };

      const handleTyping = (e) => {
        setNewMessage(e.target.value);
        firebase.database().ref(`typing/${currentUser}`).set(true);
        
        clearTimeout(typingTimeoutRef.current);
        typingTimeoutRef.current = setTimeout(() => {
          firebase.database().ref(`typing/${currentUser}`).set(false);
        }, 1000);
      };

      const handleLogout = async () => {
        if (inCall) {
          endCall();
        }

        await firebase.database().ref(`presence/${currentUser}`).set({
          online: false,
          lastSeen: new Date().toISOString()
        });

        const messagesToDelete = messages.filter(msg => {
          if (msg.sender !== currentUser) {
            return reads[msg.id] && reads[msg.id][currentUser];
          } else {
            const otherUser = currentUser === 'user1' ? 'user2' : 'user1';
            return reads[msg.id] && reads[msg.id][otherUser];
          }
        });

        for (const msg of messagesToDelete) {
          await firebase.database().ref(`messages/${msg.id}`).remove();
          await firebase.database().ref(`reads/${msg.id}`).remove();
        }

        firebase.database().ref(`typing/${currentUser}`).set(false);
        setIsAuthenticated(false);
        setCurrentUser('');
        setPasscode('');
        setCurrentView('responses');
        setSelectedChat(null);
      };

      const otherUserName = selectedChat === 'user1' ? 'Instance A' : 'Instance B';
      const isOtherTyping = typing[selectedChat];
      const otherPresence = presence[selectedChat];

      const getPresenceStatus = () => {
        if (!otherPresence) return { text: 'Offline', color: 'text-gray-400' };
        
        if (otherPresence.online) {
          return { text: 'Online', color: 'text-green-400' };
        } else {
          const lastSeen = new Date(otherPresence.lastSeen);
          const now = new Date();
          const diffMs = now - lastSeen;
          const diffMins = Math.floor(diffMs / 60000);
          const diffHours = Math.floor(diffMins / 60);
          const diffDays = Math.floor(diffHours / 24);

          let lastSeenText;
          if (diffMins < 1) lastSeenText = 'Just now';
          else if (diffMins < 60) lastSeenText = `${diffMins}m ago`;
          else if (diffHours < 24) lastSeenText = `${diffHours}h ago`;
          else lastSeenText = `${diffDays}d ago`;

          return { text: `Last seen ${lastSeenText}`, color: 'text-gray-400' };
        }
      };

      const presenceStatus = getPresenceStatus();

      // Login Screen
      if (!isAuthenticated) {
        return (
          <div className="full-page" style={{justifyContent:'center', alignItems:'center', padding:'16px', background:'#f3f4f6'}}>
            <div className="bg-white rounded-lg shadow-md p-8 w-full max-w-md">
              <div className="flex items-center gap-2 mb-6">
                <div className="w-8 h-8 bg-blue-600 rounded"></div>
                <div>
                  <h1 className="text-xl font-semibold text-gray-800">
                    AI Response Validator
                  </h1>
                  <p className="text-xs text-gray-500">Testing Framework v2.1</p>
                </div>

                    )}

                    {/* Text + metadata row */}
                    {msg.text && (
                      <div style={{ display: 'flex', alignItems: 'flex-end', gap: '6px', flexWrap: 'wrap' }}>
                        <span style={{
                          color: 'rgba(255,255,255,0.92)',
                          fontSize: '14.5px',
                          lineHeight: '1.45',
                          wordBreak: 'break-word',
                          flex: '1 1 auto'
                        }}>
                          {msg.text}
                        </span>

                        {/* Timestamp + ticks INSIDE bubble, bottom-right */}
                        <span style={{
                          display: 'flex',
                          alignItems: 'center',
                          gap: '3px',
                          marginLeft: 'auto',
                          flexShrink: 0,
                          alignSelf: 'flex-end',
                          paddingBottom: '1px'
                        }}>
                          <span style={{
                            color: 'rgba(255,255,255,0.45)',
                            fontSize: '11px',
                            whiteSpace: 'nowrap',
                            lineHeight: '1'
                          }}>
                            {timeStr}
                          </span>
                          {isMine && (
                            <svg width="16" height="11" viewBox="0 0 16 11" fill="none">
                              {isRead ? (
                                // Blue double tick (WhatsApp style)
                                <>
                                  <path d="M1 5.5L4.5 9L10 2" stroke="#53bdeb" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                                  <path d="M5 5.5L8.5 9L14 2" stroke="#53bdeb" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                                </>
                              ) : (
                                // Grey single tick
                                <path d="M3 5.5L6.5 9L13 2" stroke="rgba(255,255,255,0.45)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                              )}
                            </svg>
                          )}
                        </span>
                      </div>
                    )}

                    {/* Metadata for media-only messages */}
                    {msg.mediaData && !msg.text && (
                      <div style={{
                        display: 'flex',
                        justifyContent: 'flex-end',
                        alignItems: 'center',
                        gap: '3px',
                        padding: '4px 4px 2px',
                        marginTop: '2px'
                      }}>
                        <span style={{ color: 'rgba(255,255,255,0.45)', fontSize: '11px' }}>{timeStr}</span>
                        {isMine && (
                          <svg width="16" height="11" viewBox="0 0 16 11" fill="none">
                            {isRead ? (
                              <>
                                <path d="M1 5.5L4.5 9L10 2" stroke="#53bdeb" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                                <path d="M5 5.5L8.5 9L14 2" stroke="#53bdeb" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                              </>
                            ) : (
                              <path d="M3 5.5L6.5 9L13 2" stroke="rgba(255,255,255,0.45)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                            )}
                          </svg>
                        )}
                      </div>
                    )}
                  </div>
                </div>
              );
            })}

            {/* Typing indicator */}
            {isOtherTyping && (
              <div style={{ display: 'flex', justifyContent: 'flex-start', marginBottom: '3px' }}>
                <div style={{
                  background: '#1f2c34',
                  borderRadius: '12px 12px 12px 2px',
                  padding: '10px 16px',
                  display: 'flex',
                  gap: '4px',
                  alignItems: 'center'
                }}>
                  {[0, 0.2, 0.4].map((delay, i) => (
                    <span key={i} style={{
                      width: '7px', height: '7px',
                      borderRadius: '50%',
                      background: 'rgba(255,255,255,0.5)',
                      display: 'inline-block',
                      animation: 'bounce 1s infinite',
                      animationDelay: `${delay}s`
                    }} />
                  ))}
                </div>
              </div>
            )}

            <div ref={messagesEndRef} />
          </div>

          {/* ── INPUT BAR ── */}
          <div className="chat-input" style={{
            padding: '8px 10px',
            display: 'flex',
            alignItems: 'center',
            gap: '8px',
            boxShadow: '0 -1px 3px rgba(0,0,0,0.3)'
          }}>
            {uploading && (
              <div style={{ position: 'absolute', bottom: '70px', left: 0, right: 0, textAlign: 'center' }}>
                <span style={{ color: 'white', fontSize: '13px' }}>{uploadProgress}</span>
              </div>
            )}

            <input type="file" ref={fileInputRef} onChange={handleFileSelect} accept="image/*,video/*" style={{ display: 'none' }} />

            {/* Attachment button */}
            <button
              onClick={() => fileInputRef.current?.click()}
              disabled={uploading}
              style={{
                background: 'transparent', border: 'none', cursor: 'pointer',
                padding: '6px', display: 'flex', alignItems: 'center', justifyContent: 'center',
                opacity: uploading ? 0.5 : 1
              }}
            >
              {uploading ? (
                <svg className="animate-spin" width="22" height="22" fill="none" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10" stroke="rgba(255,255,255,0.3)" strokeWidth="4"/>
                  <path fill="rgba(255,255,255,0.8)" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                </svg>
              ) : (
                <svg width="22" height="22" fill="none" stroke="rgba(255,255,255,0.6)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24">
                  <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
                </svg>
              )}
            </button>

            {/* Text input */}
            <input
              type="text"
              value={newMessage}
              onChange={handleTyping}
              onKeyPress={(e) => e.key === 'Enter' && handleSend()}
              placeholder="Message"
              style={{
                flex: 1,
                background: '#2a3942',
                border: 'none',
                borderRadius: '24px',
                padding: '10px 16px',
                color: 'white',
                fontSize: '15px',
                outline: 'none'
              }}
            />

            {/* Send button */}
            <button
              onClick={handleSend}
              disabled={!newMessage.trim()}
              style={{
                width: '42px', height: '42px', borderRadius: '50%',
                background: newMessage.trim() ? '#00a884' : '#2a3942',
                border: 'none', cursor: newMessage.trim() ? 'pointer' : 'default',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                transition: 'background 0.2s', flexShrink: 0
              }}
            >
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
